<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#161618" />
<title>ZETTEL</title>
<style>
  :root{
    --bg:#161618;
    --bg2:#1d1d21;
    --panel:#202024;
    --panel2:#26262b;
    --text:#f4f4f7;
    --muted:#9a9aa3;
    --blue:#2f7bff;
    --red:#ff2e50;
    --green:#13d67a;
    --amber:#ffb02e;
    --line:#33333a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:
      radial-gradient(1200px 600px at 20% -10%, rgba(47,123,255,.10), transparent 60%),
      radial-gradient(1200px 600px at 80% 110%, rgba(255,46,80,.10), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    touch-action:manipulation;          /* disables double-tap-to-zoom, keeps fast taps */
    overscroll-behavior-y:none;
  }
  #app{
    max-width:560px;margin:0 auto;min-height:100vh;
    padding:18px 16px 40px;display:flex;flex-direction:column;
  }
  .brand{
    text-align:center;font-weight:800;letter-spacing:.42em;
    font-size:30px;margin:6px 0 2px;padding-left:.42em;
    background:linear-gradient(90deg,var(--blue),#a36bff,var(--red));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .brand-sub{text-align:center;color:var(--muted);font-size:12px;letter-spacing:.22em;text-transform:uppercase;margin-bottom:18px;}

  .panel{
    background:linear-gradient(180deg,var(--panel),var(--bg2));
    border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:16px;
  }
  h2{margin:0 0 14px;font-size:18px;font-weight:700;}
  h3{margin:0 0 8px;font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;}
  p.hint{color:var(--muted);font-size:13px;line-height:1.5;margin:6px 0 0;}

  label{display:block;font-size:12px;color:var(--muted);margin:0 0 6px;letter-spacing:.04em;}
  input[type=text],input[type=number]{
    width:100%;background:var(--bg);border:1px solid var(--line);border-radius:12px;
    color:var(--text);font-size:16px;padding:13px 14px;outline:none;transition:border-color .15s,box-shadow .15s;
  }
  input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(47,123,255,.18);}

  .row{display:flex;gap:10px;}
  .row>*{flex:1;}

  button{
    font-family:inherit;font-size:16px;font-weight:700;border:none;border-radius:12px;
    padding:14px 16px;color:#fff;cursor:pointer;width:100%;letter-spacing:.02em;
    transition:transform .08s ease, filter .15s ease;
  }
  button:active{transform:translateY(1px) scale(.995);}
  button:disabled{opacity:.4;cursor:not-allowed;}
  .btn-blue{background:linear-gradient(180deg,#3f88ff,#2f7bff);box-shadow:0 0 18px rgba(47,123,255,.5);}
  .btn-red{background:linear-gradient(180deg,#ff4566,#ff2e50);box-shadow:0 0 18px rgba(255,46,80,.5);}
  .btn-green{background:linear-gradient(180deg,#1fe089,#13d67a);box-shadow:0 0 18px rgba(19,214,122,.45);color:#06281a;}
  .btn-amber{background:linear-gradient(180deg,#ffbe4d,#ffb02e);box-shadow:0 0 14px rgba(255,176,46,.35);color:#3a2600;}
  .btn-ghost{background:var(--panel2);border:1px solid var(--line);color:var(--text);box-shadow:none;}
  .btn-sm{font-size:14px;padding:10px 12px;width:auto;}

  .player-item{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:9px;
  }
  .player-item .nm{font-weight:600;}
  .player-item .wc{color:var(--muted);font-size:12px;}
  .pill{font-size:11px;color:var(--muted);background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:3px 9px;}
  .x{color:var(--red);background:transparent;border:none;width:auto;font-size:18px;padding:4px 8px;line-height:1;box-shadow:none;}

  .err{color:#ff8197;font-size:13px;margin-top:10px;min-height:18px;line-height:1.4;}

  /* per-field inline validation */
  input.bad{border-color:var(--red)!important;box-shadow:0 0 0 3px rgba(255,46,80,.18)!important;}
  .wordInput{margin-bottom:4px;}
  .ferr{color:#ff8197;font-size:12px;line-height:1.35;margin:0 0 8px;}
  .ferr:empty{margin:0 0 4px;}

  /* add-player progress overview */
  .progress{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:16px;}
  .progress-title{font-weight:800;font-size:16px;}
  .progress-sub{color:var(--muted);font-size:12px;margin-top:3px;line-height:1.4;}

  /* portrait-only guard (neutralises auto-rotate on phones) */
  #rotateGuard{display:none;}
  @media (orientation:landscape) and (max-height:520px){
    #app{display:none!important;}
    #rotateGuard{
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
      position:fixed;inset:0;z-index:9999;padding:30px;text-align:center;
      background:var(--bg);color:var(--text);font-weight:700;font-size:18px;
    }
    #rotateGuard .ic{font-size:54px;}
  }

  /* glowing team cards */
  .team-card{border-radius:18px;padding:16px;margin-bottom:14px;border:2px solid;}
  @keyframes glowBlue{0%,100%{box-shadow:0 0 10px rgba(47,123,255,.55),0 0 26px rgba(47,123,255,.25);}50%{box-shadow:0 0 18px rgba(47,123,255,.85),0 0 44px rgba(47,123,255,.4);}}
  @keyframes glowRed{0%,100%{box-shadow:0 0 10px rgba(255,46,80,.55),0 0 26px rgba(255,46,80,.25);}50%{box-shadow:0 0 18px rgba(255,46,80,.85),0 0 44px rgba(255,46,80,.4);}}
  .team-blue{border-color:var(--blue);background:linear-gradient(180deg,rgba(47,123,255,.12),rgba(47,123,255,.03));animation:glowBlue 3.2s ease-in-out infinite;}
  .team-red{border-color:var(--red);background:linear-gradient(180deg,rgba(255,46,80,.12),rgba(255,46,80,.03));animation:glowRed 3.2s ease-in-out infinite;}
  .team-card h3{color:inherit;}
  .team-card .tname{font-size:18px;font-weight:800;margin-bottom:8px;}
  .c-blue{color:#7db0ff;}.c-red{color:#ff8197;}
  .members{display:flex;flex-wrap:wrap;gap:7px;}
  .member{font-size:13px;background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:999px;padding:5px 11px;}
  .member.active{font-weight:800;}

  .grow{flex:1;}
  .spacer{height:8px;}
  .center{text-align:center;}

  /* game */
  .statusbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;}
  .chip{font-size:12px;font-weight:700;padding:6px 12px;border-radius:999px;border:1px solid var(--line);}
  .chip.blue{color:#bcd4ff;border-color:var(--blue);box-shadow:0 0 10px rgba(47,123,255,.4) inset;}
  .chip.red{color:#ffc0cc;border-color:var(--red);box-shadow:0 0 10px rgba(255,46,80,.4) inset;}
  .chip.phase{color:var(--muted);}

  .timer-wrap{margin:8px 0 18px;}
  .timer-num{font-size:46px;font-weight:800;text-align:center;font-variant-numeric:tabular-nums;}
  .timer-num.low{color:var(--red);}
  .bar{height:10px;background:var(--bg);border-radius:999px;overflow:hidden;border:1px solid var(--line);margin-top:8px;}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--blue),#a36bff,var(--red));transition:width .9s linear;}

  .wordcard{
    background:var(--bg);border:2px solid var(--line);border-radius:20px;
    padding:46px 18px;text-align:center;margin:8px 0 18px;
    box-shadow:0 0 28px rgba(0,0,0,.4) inset;
  }
  .wordcard .w{font-size:34px;font-weight:800;line-height:1.15;word-break:break-word;}

  .ready-box{text-align:center;padding:24px 8px;}
  .ready-box .big{font-size:26px;font-weight:800;margin:4px 0 2px;}
  .ready-box .pname{font-size:34px;font-weight:800;margin:2px 0 10px;}

  .scoreline{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-radius:12px;margin-bottom:10px;border:1px solid var(--line);}
  .scoreline .s{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;}

  .wlist{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px;}
  .wtag{font-size:13px;background:rgba(19,214,122,.12);border:1px solid rgba(19,214,122,.4);color:#7bf3bd;border-radius:999px;padding:5px 11px;}

  .winner{font-size:30px;font-weight:800;text-align:center;margin:6px 0;}
  .confetti{font-size:40px;text-align:center;}

  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .reset{background:transparent;border:1px solid var(--line);color:var(--muted);width:auto;font-size:12px;padding:7px 11px;box-shadow:none;}
  .small-note{color:var(--muted);font-size:12px;text-align:center;margin-top:8px;}
</style>
</head>
<body>
<div id="rotateGuard"><div class="ic">📱↻</div><div>Bitte halte dein Handy im&nbsp;Hochformat</div></div>
<div id="app"></div>

<script>
"use strict";
const KEY = "zettel-game-state-v1";

const SUBPHASES = [
  {name:"Erklären",  desc:"Beschreibe das Wort mit Worten – aber sag niemals das Wort selbst (oder Teile davon)."},
  {name:"Pantomime", desc:"Nur Körper, Gestik & Mimik – kein einziger Ton!"},
  {name:"Ein Wort",  desc:"Du darfst nur ein einziges Wort als Hinweis sagen."},
  {name:"Ein Ton",   desc:"Nur ein Geräusch oder Laut – keine echten Wörter."},
];

let state = freshState();
let timerId = null;

function freshState(){
  return {
    screen:"lobby",
    settings:{ timerSeconds:40, wordsPerPlayer:5 },
    players:[],          // {name, words:[]}
    teams:null,          // [{name,color,order:[names],pointer,score}]
    game:null,
    err:""
  };
}

/* ---------- persistence ---------- */
function save(){
  try{
    const copy = JSON.parse(JSON.stringify(state));
    copy.err = "";
    localStorage.setItem(KEY, JSON.stringify(copy));
  }catch(e){}
}
function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(!raw) return false;
    const s = JSON.parse(raw);
    if(!s || !s.screen) return false;
    state = s; state.err = "";
    // recover from a reload mid-turn: restart the turn cleanly
    if(state.game && state.game.phase === "playing"){
      state.game.pool = (state.game.turnStartPool||state.game.pool).slice();
      state.game.guessedThisTurn = [];
      state.game.currentWord = null;
      state.game.phase = "ready";
    }
    return true;
  }catch(e){ return false; }
}
function hardReset(){
  if(timerId) clearInterval(timerId);
  timerId = null;
  state = freshState();
  localStorage.removeItem(KEY);
  render();
}

/* ---------- helpers ---------- */
function norm(w){ return w.trim().toLowerCase().replace(/\s+/g," "); }
function allWords(){ return state.players.flatMap(p=>p.words); }
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function el(html){ const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstChild; }

/* ---------- top header ---------- */
function header(){
  const showReset = state.players.length>0 || state.screen!=="lobby";
  return `
    <div class="topbar">
      <div></div>
      ${showReset?`<button class="reset" onclick="confirmReset()">Neues Spiel</button>`:`<div></div>`}
    </div>
    <div class="brand">ZETTEL</div>
  `;
}
function confirmReset(){
  if(confirm("Wirklich alles zurücksetzen und ein neues Spiel starten?")) hardReset();
}

/* ===================================================================
   PHASE 1 – LOBBY (Spieler, Wörter, Einstellungen)
=================================================================== */
function renderLobby(){
  const s = state.settings;
  const minPlayers = 4;
  const canTeams = state.players.length >= minPlayers;

  const playersHtml = state.players.length
    ? state.players.map((p,i)=>`
        <div class="player-item">
          <div>
            <div class="nm">${esc(p.name)}</div>
            <div class="wc">${p.words.length} Wörter</div>
          </div>
          <button class="x" onclick="removePlayer(${i})" title="Entfernen">✕</button>
        </div>`).join("")
    : `<p class="hint">Noch keine Spieler. Tippe auf „+ Spieler hinzufügen“ und reiche das Handy reihum.</p>`;

  const app = document.getElementById("app");
  app.innerHTML = `
    ${header()}

    <div class="panel">
      <h2>Einstellungen</h2>
      <div class="row">
        <div>
          <label>Timer (Sekunden)</label>
          <input type="number" id="setTimer" min="10" max="180" value="${s.timerSeconds}" inputmode="numeric" />
        </div>
        <div>
          <label>Wörter pro Spieler</label>
          <input type="number" id="setWords" min="1" max="12" value="${s.wordsPerPlayer}" inputmode="numeric" />
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>Spieler <span class="pill">${state.players.length}</span></h2>
      <div id="playerList">${playersHtml}</div>
      <div class="spacer"></div>
      <button class="btn-blue" onclick="goAddPlayer()">+ Spieler hinzufügen</button>
    </div>

    <button class="btn-red" onclick="createTeams()" ${canTeams?"":"disabled"}>Teams erstellen</button>
    ${canTeams?"":`<p class="small-note">Mindestens ${minPlayers} Spieler nötig (2 pro Team).</p>`}
  `;

  // keep settings in sync live
  app.querySelector("#setTimer").addEventListener("change", e=>{
    let v = parseInt(e.target.value,10); if(isNaN(v)) v=40; v=Math.min(180,Math.max(10,v));
    state.settings.timerSeconds = v; e.target.value=v; save();
  });
  app.querySelector("#setWords").addEventListener("change", e=>{
    let v = parseInt(e.target.value,10); if(isNaN(v)) v=5; v=Math.min(12,Math.max(1,v));
    state.settings.wordsPerPlayer = v; e.target.value=v; save();
  });
}
function removePlayer(i){ state.players.splice(i,1); save(); render(); }
function goAddPlayer(){ state.screen="addPlayer"; state.err=""; save(); render(); }

/* ----- add player form ----- */
function renderAddPlayer(){
  const n = state.settings.wordsPerPlayer;
  const num = state.players.length + 1;
  const added = state.players.map(p=>esc(p.name)).join(", ");
  const wordInputs = Array.from({length:n}).map((_,i)=>`
    <input type="text" class="wordInput" data-i="${i}" placeholder="Wort ${i+1}" autocomplete="off" autocapitalize="off" />
    <div class="ferr" data-err="${i}"></div>`).join("");

  const app = document.getElementById("app");
  app.innerHTML = `
    ${header()}
    <div class="panel">
      <div class="progress">
        <div class="progress-title">Spieler #${num} hinzufügen</div>
        <div class="progress-sub">${state.players.length ? "Bereits dabei ("+state.players.length+"): "+added : "Erster Spieler – los geht's! 🎉"}</div>
      </div>
      <label>Name</label>
      <input type="text" id="pName" placeholder="Dein Name" autocomplete="off" />
      <div class="ferr" id="nameErr"></div>
      <div class="spacer"></div>
      <h3>${n} Wörter</h3>
      <p class="hint" style="margin-bottom:12px;">Geheim eingeben 🙈 – keine Dopplungen. Wird beim Verlassen des Feldes geprüft.</p>
      ${wordInputs}
      <div class="err" id="addErr"></div>
      <div class="row">
        <button class="btn-ghost" onclick="cancelAdd()">Abbrechen</button>
        <button class="btn-green" onclick="savePlayer()">Spieler speichern</button>
      </div>
    </div>
  `;
  // live validation on blur; clear a field's error as soon as it's edited again
  app.querySelectorAll(".wordInput").forEach(inp=>{
    inp.addEventListener("blur", liveValidateWords);
    inp.addEventListener("input", ()=>clearFieldError(inp));
  });
  const pn = app.querySelector("#pName");
  pn.addEventListener("blur", validateName);
  pn.addEventListener("input", ()=>{ pn.classList.remove("bad"); const e=app.querySelector("#nameErr"); if(e) e.textContent=""; });
  pn.focus();
}
function cancelAdd(){ state.screen="lobby"; state.err=""; save(); render(); }

function setFieldError(inp, errEl, msg){
  if(msg){ inp.classList.add("bad"); if(errEl) errEl.textContent = msg; }
  else { inp.classList.remove("bad"); if(errEl) errEl.textContent = ""; }
}
function clearFieldError(inp){
  inp.classList.remove("bad");
  const errEl = document.querySelector('.ferr[data-err="'+inp.dataset.i+'"]');
  if(errEl) errEl.textContent = "";
}
function validateName(){
  const app = document.getElementById("app");
  const pn = app.querySelector("#pName"); if(!pn) return true;
  const errEl = app.querySelector("#nameErr");
  const name = pn.value.trim();
  let msg = "";
  if(name && state.players.some(p=>norm(p.name)===norm(name))) msg = "Diesen Namen gibt es schon.";
  setFieldError(pn, errEl, msg);
  return !msg;
}
// validates all word fields against each other and the existing pool (whitespace + casing ignored)
function liveValidateWords(){
  const app = document.getElementById("app");
  const inputs = [...app.querySelectorAll(".wordInput")];
  const existing = new Set(allWords().map(norm));   // words of already-added players
  const counts = {};
  inputs.forEach(inp=>{ if(inp.value.trim()){ const k=norm(inp.value); counts[k]=(counts[k]||0)+1; } });
  inputs.forEach(inp=>{
    const errEl = app.querySelector('.ferr[data-err="'+inp.dataset.i+'"]');
    const val = inp.value.trim();
    let msg = "";
    if(val){
      const k = norm(val);
      if(existing.has(k)) msg = "Schon von einem anderen Spieler genommen.";
      else if(counts[k] > 1) msg = "Dieses Wort hast du doppelt.";
    }
    setFieldError(inp, errEl, msg);
  });
}
function savePlayer(){
  const app = document.getElementById("app");
  const pn = app.querySelector("#pName");
  const inputs = [...app.querySelectorAll(".wordInput")];
  const addErr = app.querySelector("#addErr");
  addErr.textContent = "";

  let firstBad = null;

  // name: empty or duplicate
  if(!pn.value.trim()){ setFieldError(pn, app.querySelector("#nameErr"), "Bitte einen Namen eingeben."); firstBad = firstBad || pn; }
  else if(!validateName()){ firstBad = firstBad || pn; }

  // duplicate / pool checks for words
  liveValidateWords();

  // empty word fields
  inputs.forEach(inp=>{
    if(!inp.value.trim()){
      setFieldError(inp, app.querySelector('.ferr[data-err="'+inp.dataset.i+'"]'), "Bitte ausfüllen.");
      firstBad = firstBad || inp;
    }
  });

  const anyBad = pn.classList.contains("bad") || inputs.some(inp=>inp.classList.contains("bad"));
  if(firstBad || anyBad){
    addErr.textContent = "Bitte korrigiere die markierten Felder.";
    (firstBad || inputs.find(inp=>inp.classList.contains("bad")) || pn).focus();
    return;   // no re-render -> all already-entered values are kept
  }

  state.players.push({ name: pn.value.trim(), words: inputs.map(i=>i.value.trim()) });
  state.err = "";
  state.screen = "lobby";
  save(); render();
}

/* ===================================================================
   PHASE 2 – TEAMS
=================================================================== */
function createTeams(){
  const order = shuffle(state.players.map(p=>p.name));
  const half = Math.ceil(order.length/2);   // odd -> team 1 gets the extra
  const t1 = order.slice(0,half);
  const t2 = order.slice(half);
  state.teams = [
    { name:"Team Blau", color:"blue", order:t1, pointer:Math.floor(Math.random()*t1.length), score:0 },
    { name:"Team Rot",  color:"red",  order:t2, pointer:Math.floor(Math.random()*t2.length), score:0 },
  ];
  state.screen = "teams";
  save(); render();
}
function renderTeams(){
  const [a,b] = state.teams;
  const app = document.getElementById("app");
  app.innerHTML = `
    ${header()}
    <h2 class="center" style="margin-bottom:14px;">Die Teams stehen!</h2>
    ${teamCard(a)}
    ${teamCard(b)}
    <button class="btn-green" onclick="startGame()">Spiel starten</button>
    <p class="small-note">Tipp: Pro Zug rät dein eigenes Team mit, während du das Handy hältst.</p>
  `;
}
function teamCard(t, activeName){
  const cls = t.color==="blue"?"team-blue":"team-red";
  const cc = t.color==="blue"?"c-blue":"c-red";
  const members = t.order.map(n=>`<span class="member ${activeName&&n===activeName?'active':''}">${esc(n)}${activeName&&n===activeName?' 🎤':''}</span>`).join("");
  return `
    <div class="team-card ${cls}">
      <div class="tname ${cc}">${esc(t.name)}</div>
      <div class="members">${members}</div>
    </div>`;
}

/* ===================================================================
   PHASE 3 – GAME
=================================================================== */
function startGame(){
  state.game = {
    subphaseIndex:0,
    pool: shuffle(allWords()),
    currentTeamIndex: Math.floor(Math.random()*2),  // random starting team
    currentWord:null,
    guessedThisTurn:[],
    turnStartPool:[],
    timeLeft: state.settings.timerSeconds,
    phase:"ready"
  };
  state.screen = "game";
  save(); render();
}

function curTeam(){ return state.teams[state.game.currentTeamIndex]; }
function activePlayer(){ const t=curTeam(); return t.order[t.pointer]; }

function renderGame(){
  const g = state.game;
  if(g.phase==="ready")        return renderReady();
  if(g.phase==="playing")      return renderPlaying();
  if(g.phase==="turnResult")   return renderTurnResult();
  if(g.phase==="subphaseDone") return renderSubphaseDone();
}

function gameStatusbar(){
  const g = state.game;
  const t = curTeam();
  const chipCls = t.color==="blue"?"blue":"red";
  return `
    <div class="statusbar">
      <span class="chip phase">${esc(SUBPHASES[g.subphaseIndex].name)}</span>
      <span class="chip ${chipCls}">${esc(t.name)} · ${esc(activePlayer())}</span>
    </div>`;
}

/* ----- ready (pass the phone) ----- */
function renderReady(){
  const g = state.game;
  const t = curTeam();
  const sp = SUBPHASES[g.subphaseIndex];
  const accent = t.color==="blue"?"btn-blue":"btn-red";
  const cc = t.color==="blue"?"c-blue":"c-red";
  const app = document.getElementById("app");
  app.innerHTML = `
    ${header()}
    ${gameStatusbar()}
    <div class="panel">
      <div class="ready-box">
        <div class="big ${cc}">${esc(t.name)}</div>
        <div class="pname">${esc(activePlayer())} 🎤</div>
        <h3 style="margin-top:14px;">Runde: ${esc(sp.name)}</h3>
        <p class="hint">${esc(sp.desc)}</p>
      </div>
      <button class="${accent}" onclick="startTurn()">Start (${g.timeLeft}s)</button>
      <p class="small-note">Gib das Handy an ${esc(activePlayer())}. Erst dann auf Start tippen!</p>
    </div>
    ${miniScore()}
  `;
}

/* ----- playing ----- */
function startTurn(){
  const g = state.game;
  g.timeLeft = state.settings.timerSeconds;
  g.guessedThisTurn = [];
  g.turnStartPool = g.pool.slice();
  g.currentWord = null;
  g.phase = "playing";
  pickWord();
  save();
  render();
  if(timerId) clearInterval(timerId);
  timerId = setInterval(tick, 1000);
}
function tick(){
  const g = state.game;
  g.timeLeft--;
  if(g.timeLeft <= 0){ g.timeLeft = 0; endTurn(); return; }
  updateTimerUI();
  save();
}
function pickWord(){
  const g = state.game;
  if(g.pool.length===0){ g.currentWord=null; return; }
  let cands = g.pool.filter(w=>w!==g.currentWord);
  if(cands.length===0) cands = g.pool;           // only the skipped word remains
  g.currentWord = cands[Math.floor(Math.random()*cands.length)];
}
function guessed(){
  const g = state.game;
  if(!g.currentWord) return;
  g.guessedThisTurn.push(g.currentWord);
  g.pool = g.pool.filter(w=>w!==g.currentWord);
  g.currentWord = null;
  if(g.pool.length===0){ endTurn(); return; }    // subphase finished mid-turn
  pickWord();
  save();
  renderWordOnly();
}
function skipWord(){
  const g = state.game;
  pickWord();   // leaves current word in pool, shows another
  save();
  renderWordOnly();
}
function renderPlaying(){
  const g = state.game;
  const t = curTeam();
  const accent = t.color==="blue"?"blue":"red";
  const app = document.getElementById("app");
  app.innerHTML = `
    ${header()}
    ${gameStatusbar()}
    <div class="timer-wrap">
      <div class="timer-num ${g.timeLeft<=10?'low':''}" id="timerNum">${g.timeLeft}</div>
      <div class="bar"><i id="timerBar" style="width:${(g.timeLeft/state.settings.timerSeconds)*100}%"></i></div>
    </div>
    <div class="wordcard"><div class="w" id="curWord">${esc(g.currentWord||"–")}</div></div>
    <button class="btn-green" onclick="guessed()">Erraten ✓</button>
    <div class="spacer"></div>
    <button class="btn-amber" onclick="skipWord()">Skip ⤼</button>
  `;
}
function renderWordOnly(){
  const g = state.game;
  const w = document.getElementById("curWord");
  if(w) w.textContent = g.currentWord||"–";
  const c = document.getElementById("gCount");
  if(c) c.textContent = g.guessedThisTurn.length;
}
function updateTimerUI(){
  const g = state.game;
  const num = document.getElementById("timerNum");
  if(num){ num.textContent = g.timeLeft; num.classList.toggle("low", g.timeLeft<=10); }
  const bar = document.getElementById("timerBar");
  if(bar) bar.style.width = ((g.timeLeft/state.settings.timerSeconds)*100)+"%";
}

/* ----- end of a turn ----- */
function endTurn(){
  if(timerId){ clearInterval(timerId); timerId=null; }
  const g = state.game;
  const t = curTeam();
  t.score += g.guessedThisTurn.length;   // add guessed words to team total
  t.pointer = (t.pointer + 1) % t.order.length;   // fixed cycle for next time
  g.phase = "turnResult";
  save();
  render();
}
function renderTurnResult(){
  const g = state.game;
  const t = curTeam();   // team that just played (pointer already advanced, but team index unchanged)
  const poolEmpty = g.pool.length===0;
  const wordsHtml = g.guessedThisTurn.length
    ? `<div class="wlist">${g.guessedThisTurn.map(w=>`<span class="wtag">${esc(w)}</span>`).join("")}</div>`
    : `<p class="hint">Diese Runde leider kein Wort erraten.</p>`;
  const cc = t.color==="blue"?"c-blue":"c-red";
  const app = document.getElementById("app");
  app.innerHTML = `
    ${header()}
    <h2 class="center">Zeit um! ⏱</h2>
    <div class="panel">
      <h3 class="${cc}">${esc(t.name)} – diese Runde</h3>
      <div class="center" style="font-size:40px;font-weight:800;margin:6px 0;">+${g.guessedThisTurn.length}</div>
      ${wordsHtml}
    </div>
    ${scoreBoard()}
    <button class="btn-blue" onclick="nextTurn()">
      ${poolEmpty ? "Runde ausgewertet – weiter" : "Weiter zum nächsten Team"}
    </button>
    ${poolEmpty?"":`<p class="small-note">Noch ${g.pool.length} Wörter in der Runde „${esc(SUBPHASES[g.subphaseIndex].name)}“.</p>`}
  `;
}
function nextTurn(){
  const g = state.game;
  if(g.pool.length===0){
    g.phase = "subphaseDone";
  }else{
    g.currentTeamIndex = 1 - g.currentTeamIndex;   // teams alternate
    g.phase = "ready";
  }
  save(); render();
}

/* ----- subphase finished ----- */
function renderSubphaseDone(){
  const g = state.game;
  const last = g.subphaseIndex >= SUBPHASES.length-1;
  const app = document.getElementById("app");
  if(last){
    state.screen = "final";
    save(); return render();
  }
  const next = SUBPHASES[g.subphaseIndex+1];
  app.innerHTML = `
    ${header()}
    <div class="confetti">🎉</div>
    <h2 class="center">Runde „${esc(SUBPHASES[g.subphaseIndex].name)}“ geschafft!</h2>
    ${scoreBoard()}
    <div class="panel">
      <h3>Nächste Runde</h3>
      <div class="center" style="font-size:24px;font-weight:800;margin:4px 0;">${esc(next.name)}</div>
      <p class="hint center">${esc(next.desc)}</p>
      <p class="hint center" style="margin-top:8px;">Alle Wörter kommen wieder in den Topf.</p>
    </div>
    <button class="btn-green" onclick="nextSubphase()">Weiter zu „${esc(next.name)}“</button>
  `;
}
function nextSubphase(){
  const g = state.game;
  g.subphaseIndex++;
  g.pool = shuffle(allWords());
  g.currentTeamIndex = 1 - g.currentTeamIndex;
  g.currentWord = null;
  g.guessedThisTurn = [];
  g.phase = "ready";
  save(); render();
}

/* ----- scoreboards ----- */
function scoreBoard(){
  const [a,b] = state.teams;
  return `
    <div class="panel">
      <h3>Gesamtstand</h3>
      ${scoreRow(a)}
      ${scoreRow(b)}
    </div>`;
}
function scoreRow(t){
  const cls = t.color==="blue"?"team-blue":"team-red";
  const cc = t.color==="blue"?"c-blue":"c-red";
  return `<div class="scoreline ${cls}"><span class="${cc}" style="font-weight:800;">${esc(t.name)}</span><span class="s">${t.score}</span></div>`;
}
function miniScore(){
  const [a,b] = state.teams;
  return `
    <div class="row" style="gap:10px;">
      <div class="scoreline team-blue grow"><span class="c-blue" style="font-weight:800;">${esc(a.name)}</span><span class="s">${a.score}</span></div>
      <div class="scoreline team-red grow"><span class="c-red" style="font-weight:800;">${esc(b.name)}</span><span class="s">${b.score}</span></div>
    </div>`;
}

/* ===================================================================
   FINAL
=================================================================== */
function renderFinal(){
  const [a,b] = state.teams;
  let title, sub;
  if(a.score===b.score){ title="Unentschieden!"; sub="Was für ein Krimi 🤝"; }
  else{
    const w = a.score>b.score?a:b;
    title = `${w.name} gewinnt! 🏆`;
    sub = w.color==="blue"?"Blau triumphiert 💙":"Rot triumphiert ❤️";
  }
  const app = document.getElementById("app");
  app.innerHTML = `
    ${header()}
    <div class="confetti">🎊🏆🎊</div>
    <div class="winner">${esc(title)}</div>
    <p class="center hint" style="margin-bottom:16px;">${sub}</p>
    ${scoreBoard()}
    <button class="btn-blue" onclick="confirmReset()">Neues Spiel</button>
  `;
}

/* ---------- router ---------- */
function render(){
  const s = state;
  if(s.screen==="lobby")      return renderLobby();
  if(s.screen==="addPlayer")  return renderAddPlayer();
  if(s.screen==="teams")      return renderTeams();
  if(s.screen==="game")       return renderGame();
  if(s.screen==="final")      return renderFinal();
  renderLobby();
}

/* expose handlers used in inline onclick */
Object.assign(window,{
  confirmReset, removePlayer, goAddPlayer, cancelAdd, savePlayer,
  createTeams, startGame, startTurn, guessed, skipWord, nextTurn,
  nextSubphase
});

/* ---------- boot ---------- */
// best-effort portrait lock (works in installed/fullscreen PWA contexts; harmless otherwise)
try{
  if(screen.orientation && screen.orientation.lock){
    const p = screen.orientation.lock("portrait");
    if(p && p.catch) p.catch(()=>{});
  }
}catch(e){}

load();
render();
window.addEventListener("beforeunload", save);
</script>
</body>
</html>
