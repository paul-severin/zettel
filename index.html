<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#161618" />
<title>ZETTEL</title>
<style>
  :root{
    --bg:#161618;
    --bg2:#1d1d21;
    --panel:#202024;
    --panel2:#26262b;
    --text:#f4f4f7;
    --muted:#9a9aa3;
    --blue:#2f7bff;
    --red:#ff2e50;
    --green:#13d67a;
    --amber:#ffb02e;
    --line:#33333a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:
      radial-gradient(1200px 600px at 20% -10%, rgba(47,123,255,.10), transparent 60%),
      radial-gradient(1200px 600px at 80% 110%, rgba(255,46,80,.10), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    touch-action:manipulation;          /* disables double-tap-to-zoom, keeps fast taps */
    overscroll-behavior-y:none;
  }
  #app{
    max-width:560px;margin:0 auto;min-height:100vh;
    padding:18px 16px 40px;display:flex;flex-direction:column;
  }
  .brand{
    text-align:center;font-weight:800;letter-spacing:.42em;
    font-size:30px;margin:6px 0 2px;padding-left:.42em;
    background:linear-gradient(90deg,var(--blue),#a36bff,var(--red));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .brand-sub{text-align:center;color:var(--muted);font-size:12px;letter-spacing:.22em;text-transform:uppercase;margin-bottom:18px;}

  .panel{
    background:linear-gradient(180deg,var(--panel),var(--bg2));
    border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:16px;
  }
  h2{margin:0 0 14px;font-size:18px;font-weight:700;}
  h3{margin:0 0 8px;font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;}
  p.hint{color:var(--muted);font-size:13px;line-height:1.5;margin:6px 0 0;}

  label{display:block;font-size:12px;color:var(--muted);margin:0 0 6px;letter-spacing:.04em;}
  input[type=text],input[type=number]{
    width:100%;background:var(--bg);border:1px solid var(--line);border-radius:12px;
    color:var(--text);font-size:16px;padding:13px 14px;outline:none;transition:border-color .15s,box-shadow .15s;
  }
  input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(47,123,255,.18);}

  .row{display:flex;gap:10px;}
  .row>*{flex:1;}

  button{
    font-family:inherit;font-size:16px;font-weight:700;border:none;border-radius:12px;
    padding:14px 16px;color:#fff;cursor:pointer;width:100%;letter-spacing:.02em;
    transition:transform .08s ease, filter .15s ease;
  }
  button:active{transform:translateY(1px) scale(.995);}
  button:disabled{opacity:.4;cursor:not-allowed;}
  .btn-blue{background:linear-gradient(180deg,#3f88ff,#2f7bff);box-shadow:0 0 18px rgba(47,123,255,.5);}
  .btn-red{background:linear-gradient(180deg,#ff4566,#ff2e50);box-shadow:0 0 18px rgba(255,46,80,.5);}
  .btn-green{background:linear-gradient(180deg,#1fe089,#13d67a);box-shadow:0 0 18px rgba(19,214,122,.45);color:#06281a;}
  .btn-amber{background:linear-gradient(180deg,#ffbe4d,#ffb02e);box-shadow:0 0 14px rgba(255,176,46,.35);color:#3a2600;}
  .btn-ghost{background:var(--panel2);border:1px solid var(--line);color:var(--text);box-shadow:none;}
  .btn-sm{font-size:14px;padding:10px 12px;width:auto;}

  .player-item{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:9px;
  }
  .player-item .nm{font-weight:600;}
  .player-item .wc{color:var(--muted);font-size:12px;}
  .pill{font-size:11px;color:var(--muted);background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:3px 9px;}
  .x{color:var(--red);background:transparent;border:none;width:auto;font-size:18px;padding:4px 8px;line-height:1;box-shadow:none;}

  .err{color:#ff8197;font-size:13px;margin-top:10px;min-height:18px;line-height:1.4;}

  /* per-field inline validation */
  input.bad{border-color:var(--red)!important;box-shadow:0 0 0 3px rgba(255,46,80,.18)!important;}
  .wordInput{margin-bottom:4px;}
  .ferr{color:#ff8197;font-size:12px;line-height:1.35;margin:0 0 8px;}
  .ferr:empty{margin:0 0 4px;}

  /* add-player progress overview */
  .progress{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:16px;}
  .progress-title{font-weight:800;font-size:16px;}
  .progress-sub{color:var(--muted);font-size:12px;margin-top:3px;line-height:1.4;}

  /* portrait-only guard (neutralises auto-rotate on phones) */
  #rotateGuard{display:none;}
  @media (orientation:landscape) and (max-height:520px){
    #app{display:none!important;}
    #rotateGuard{
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
      position:fixed;inset:0;z-index:9999;padding:30px;text-align:center;
      background:var(--bg);color:var(--text);font-weight:700;font-size:18px;
    }
    #rotateGuard .ic{font-size:54px;}
  }

  /* glowing team cards */
  .team-card{border-radius:18px;padding:16px;margin-bottom:14px;border:2px solid;}
  @keyframes glowBlue{0%,100%{box-shadow:0 0 10px rgba(47,123,255,.55),0 0 26px rgba(47,123,255,.25);}50%{box-shadow:0 0 18px rgba(47,123,255,.85),0 0 44px rgba(47,123,255,.4);}}
  @keyframes glowRed{0%,100%{box-shadow:0 0 10px rgba(255,46,80,.55),0 0 26px rgba(255,46,80,.25);}50%{box-shadow:0 0 18px rgba(255,46,80,.85),0 0 44px rgba(255,46,80,.4);}}
  .team-blue{border-color:var(--blue);background:linear-gradient(180deg,rgba(47,123,255,.12),rgba(47,123,255,.03));animation:glowBlue 3.2s ease-in-out infinite;}
  .team-red{border-color:var(--red);background:linear-gradient(180deg,rgba(255,46,80,.12),rgba(255,46,80,.03));animation:glowRed 3.2s ease-in-out infinite;}
  .team-card h3{color:inherit;}
  .team-card .tname{font-size:18px;font-weight:800;margin-bottom:8px;}
  .c-blue{color:#7db0ff;}.c-red{color:#ff8197;}
  .members{display:flex;flex-wrap:wrap;gap:7px;}
  .member{font-size:13px;background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:999px;padding:5px 11px;}
  .member.active{font-weight:800;}

  /* editable teams: drag & drop + rename */
  .member.draggable{cursor:grab;touch-action:none;user-select:none;-webkit-user-select:none;}
  .member.draggable::before{content:"⠿";opacity:.5;margin-right:6px;font-size:12px;letter-spacing:-2px;}
  .member.draggable:active{cursor:grabbing;}
  .member.dragging{opacity:.25;}
  .member.placeholder{border-style:dashed;background:transparent;color:var(--muted);}
  .members.editable{min-height:48px;align-content:flex-start;padding:7px;border-radius:12px;border:1px dashed transparent;transition:border-color .15s,background .15s;}
  .members.dragover{border-color:currentColor;background:rgba(255,255,255,.05);}
  .members .empty-hint{font-size:12px;color:var(--muted);font-style:italic;padding:6px 2px;}
  .drag-ghost{
    position:fixed;left:0;top:0;z-index:10000;pointer-events:none;transform:translate(-50%,-50%);
    font-size:13px;font-weight:800;background:var(--panel2);border:1px solid var(--line);
    border-radius:999px;padding:5px 11px;box-shadow:0 8px 22px rgba(0,0,0,.55);opacity:.96;
  }
  .tname-input{
    width:100%;background:rgba(0,0,0,.18);border:1px solid var(--line);border-radius:10px;
    font-size:18px;font-weight:800;padding:8px 10px;margin-bottom:10px;outline:none;color:inherit;
    transition:border-color .15s,box-shadow .15s;
  }
  .tname-input:focus{border-color:currentColor;box-shadow:0 0 0 3px rgba(255,255,255,.08);}
  .edit-hint{color:var(--muted);font-size:12px;text-align:center;margin:-2px 0 14px;line-height:1.45;}

  /* word editor */
  .word-edit-row{display:flex;gap:8px;align-items:center;margin-bottom:4px;}
  .word-edit-row input{flex:1;}

  /* phase editor */
  textarea{
    width:100%;background:var(--bg);border:1px solid var(--line);border-radius:12px;
    color:var(--text);font-family:inherit;font-size:15px;padding:11px 12px;outline:none;resize:vertical;
    transition:border-color .15s,box-shadow .15s;
  }
  textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(47,123,255,.18);}
  .phase-edit{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px;}
  .phase-edit-head{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
  .phase-edit-head .pName{flex:1;font-weight:700;}
  .phase-timer{display:flex;align-items:center;gap:6px;flex:0 0 auto;}
  .phase-timer input{width:64px;text-align:center;}
  .phase-timer span{color:var(--muted);font-size:13px;}
  .phase-actions{display:flex;gap:8px;margin-top:8px;}
  .phase-actions button{flex:0 0 auto;}
  .phase-actions .phase-del{margin-left:auto;color:var(--red);}

  /* in-game status: team color band + avatar + phase progress */
  .gstatus{margin-bottom:16px;}
  .gstatus-band{display:flex;align-items:center;gap:12px;border-radius:16px;padding:12px 14px;border:2px solid;}
  .avatar{
    width:46px;height:46px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:21px;background:rgba(0,0,0,.32);border:2px solid currentColor;
  }
  .gstatus-who{min-width:0;}
  .gstatus-name{font-size:22px;font-weight:800;line-height:1.12;word-break:break-word;}
  .gstatus-team{font-size:13px;font-weight:700;margin-top:2px;}
  .gstatus-phase{
    display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px;
    padding:8px 14px;background:var(--panel2);border:1px solid var(--line);border-radius:999px;
  }
  .gphase-label{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.04em;}
  .dots{display:flex;gap:6px;align-items:center;}
  .dots>i{width:8px;height:8px;border-radius:50%;background:var(--line);display:block;}
  .dots>i.on{background:linear-gradient(90deg,var(--blue),#a36bff,var(--red));}

  .grow{flex:1;}
  .spacer{height:8px;}
  .center{text-align:center;}

  /* game */
  .statusbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;}
  .chip{font-size:12px;font-weight:700;padding:6px 12px;border-radius:999px;border:1px solid var(--line);}
  .chip.blue{color:#bcd4ff;border-color:var(--blue);box-shadow:0 0 10px rgba(47,123,255,.4) inset;}
  .chip.red{color:#ffc0cc;border-color:var(--red);box-shadow:0 0 10px rgba(255,46,80,.4) inset;}
  .chip.phase{color:var(--muted);}

  .timer-wrap{margin:8px 0 18px;}
  .timer-num{font-size:46px;font-weight:800;text-align:center;font-variant-numeric:tabular-nums;}
  .timer-num.low{color:var(--red);}
  .bar{height:10px;background:var(--bg);border-radius:999px;overflow:hidden;border:1px solid var(--line);margin-top:8px;}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--blue),#a36bff,var(--red));transition:width .9s linear;}

  .wordcard{
    background:var(--bg);border:2px solid var(--line);border-radius:20px;
    padding:46px 18px;text-align:center;margin:8px 0 18px;
    box-shadow:0 0 28px rgba(0,0,0,.4) inset;
  }
  .wordcard .w{font-size:34px;font-weight:800;line-height:1.15;word-break:break-word;}

  .ready-box{text-align:center;padding:24px 8px;}
  .ready-box .big{font-size:26px;font-weight:800;margin:4px 0 2px;}
  .ready-box .pname{font-size:34px;font-weight:800;margin:2px 0 10px;}

  .scoreline{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-radius:12px;margin-bottom:10px;border:1px solid var(--line);}
  .scoreline .s{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;}

  .wlist{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px;}
  .wtag{font-size:13px;background:rgba(19,214,122,.12);border:1px solid rgba(19,214,122,.4);color:#7bf3bd;border-radius:999px;padding:5px 11px;}
  .wtag-btn{width:auto;cursor:pointer;}
  .wtag-btn:active{filter:brightness(1.2);}

  .winner{font-size:30px;font-weight:800;text-align:center;margin:6px 0;}
  .confetti{font-size:40px;text-align:center;}

  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .reset{background:transparent;border:1px solid var(--line);color:var(--muted);width:auto;font-size:12px;padding:7px 11px;box-shadow:none;}
  .small-note{color:var(--muted);font-size:12px;text-align:center;margin-top:8px;}
  .testbtn{background:transparent;border:none;color:var(--muted);font-size:12px;width:auto;display:block;margin:26px auto 0;text-decoration:underline;box-shadow:none;opacity:.55;}
</style>
</head>
<body>
<div id="rotateGuard"><div class="ic">📱↻</div><div>Bitte halte dein Handy im&nbsp;Hochformat</div></div>
<div id="app"></div>

<script>
"use strict";
const KEY = "zettel-game-state-v1";

// the default rounds; users can rename / reorder / add / delete these in the lobby
const DEFAULT_PHASES = [
  {name:"Erklären",  desc:"Beschreibe das Wort mit Worten – aber sag niemals das Wort selbst (oder Teile davon).", timer:40},
  {name:"Pantomime", desc:"Nur Körper, Gestik & Mimik – kein einziger Ton!", timer:40},
  {name:"Ein Wort",  desc:"Du darfst nur ein einziges Wort als Hinweis sagen.", timer:20},
  {name:"Ein Ton",   desc:"Nur ein Geräusch oder Laut – keine echten Wörter.", timer:40},
];
function defaultPhases(){ return JSON.parse(JSON.stringify(DEFAULT_PHASES)); }
function phases(){ return state.settings.phases; }

let state = freshState();
let timerId = null;

function freshState(){
  return {
    screen:"lobby",
    settings:{ phases:defaultPhases(), wordsPerPlayer:5 },   // each phase carries its own timer (s)
    players:[],          // {name, words:[]}
    teams:null,          // [{name,color,order:[names],pointer,score}]
    game:null,
    err:""
  };
}

/* ---------- persistence ---------- */
function save(){
  try{
    const copy = JSON.parse(JSON.stringify(state));
    copy.err = "";
    localStorage.setItem(KEY, JSON.stringify(copy));
  }catch(e){}
}
function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(!raw) return false;
    const s = JSON.parse(raw);
    if(!s || !s.screen) return false;
    state = s; state.err = "";
    // migrate older saves: timerSeconds / timers[] -> editable phases[] with per-phase timer
    if(!state.settings) state.settings = {};
    if(!Array.isArray(state.settings.phases)){
      const old = Array.isArray(state.settings.timers)
        ? state.settings.timers
        : [ (state.settings.timerSeconds||40) ];
      state.settings.phases = DEFAULT_PHASES.map((p,i)=>({
        name:p.name, desc:p.desc, timer: Number(old[i]) || p.timer
      }));
    }
    // ensure every phase is well-formed
    state.settings.phases = state.settings.phases.map(p=>({
      name: (p && p.name) || "Phase",
      desc: (p && p.desc) || "",
      timer: Math.min(180, Math.max(5, Number(p && p.timer) || 40))
    }));
    delete state.settings.timers;
    delete state.settings.timerSeconds;
    if(!state.settings.wordsPerPlayer) state.settings.wordsPerPlayer = 5;
    // recover from a reload mid-turn: restart the turn cleanly
    if(state.game && state.game.phase === "playing"){
      state.game.pool = (state.game.turnStartPool||state.game.pool).slice();
      state.game.guessedThisTurn = [];
      state.game.currentWord = null;
      state.game.phase = "ready";
    }
    return true;
  }catch(e){ return false; }
}
function hardReset(){
  if(timerId) clearInterval(timerId);
  timerId = null;
  state = freshState();
  localStorage.removeItem(KEY);
  render();
}

/* ---------- helpers ---------- */
function norm(w){ return w.trim().toLowerCase().replace(/\s+/g," "); }
function allWords(){ return state.players.flatMap(p=>p.words); }
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* ---------- beep (Web Audio, offline) ---------- */
let audioCtx = null;
function unlockAudio(){   // call inside a user gesture (Start tap) so iOS allows sound
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state === "suspended") audioCtx.resume();
  }catch(e){}
}
function beep(freq, dur){
  try{
    unlockAudio();
    if(!audioCtx) return;
    const o = audioCtx.createOscillator();
    const gn = audioCtx.createGain();
    o.type = "square"; o.frequency.value = freq;
    o.connect(gn); gn.connect(audioCtx.destination);
    const t = audioCtx.currentTime;
    gn.gain.setValueAtTime(0.0001, t);
    gn.gain.exponentialRampToValueAtTime(0.3, t+0.01);
    gn.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.start(t); o.stop(t+dur+0.02);
  }catch(e){}
}
function el(html){ const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstChild; }

/* ---------- top header ---------- */
function header(){
  const showReset = state.players.length>0 || state.screen!=="lobby";
  return `
    <div class="topbar">
      <div></div>
      ${showReset?`<button class="reset" onclick="confirmReset()">Neues Spiel</button>`:`<div></div>`}
    </div>
    <div class="brand">ZETTEL</div>
  `;
}
function confirmReset(){
  if(confirm("Wirklich alles zurücksetzen und ein neues Spiel starten?")) hardReset();
}

/* ===================================================================
   PHASE 1 – LOBBY (Spieler, Wörter, Einstellungen)
=================================================================== */
function renderLobby(){
  const s = state.settings;
  const minPlayers = 4;
  const canTeams = state.players.length >= minPlayers;

  const playersHtml = state.players.length
    ? state.players.map((p,i)=>`
        <div class="player-item">
          <div>
            <div class="nm">${esc(p.name)}</div>
            <div class="wc">${p.words.length} Wörter</div>
          </div>
          <button class="x" onclick="removePlayer(${i})" title="Entfernen">✕</button>
        </div>`).join("")
    : `<p class="hint">Noch keine Spieler. Tippe auf „+ Spieler hinzufügen“ und reiche das Handy reihum.</p>`;

  const app = document.getElementById("app");
  app.innerHTML = `
    ${header()}

    <div class="panel">
      <h2>Einstellungen</h2>
      <label>Wörter pro Spieler</label>
      <input type="number" id="setWords" min="1" max="12" value="${s.wordsPerPlayer}" inputmode="numeric" />
    </div>

    <div class="panel">
      <h2>Phasen <span class="pill">${s.phases.length}</span></h2>
      <p class="hint" style="margin:0 0 12px;">Runden umbenennen, Hinweistext & Timer anpassen, sortieren oder löschen.</p>
      <div id="phaseList">${s.phases.map((p,i)=>phaseEditor(p,i,s.phases.length)).join("")}</div>
      <div class="spacer"></div>
      <button class="btn-ghost" onclick="addPhase()">+ Phase hinzufügen</button>
    </div>

    <div class="panel">
      <h2>Spieler <span class="pill">${state.players.length}</span></h2>
      <div id="playerList">${playersHtml}</div>
      <div class="spacer"></div>
      <button class="btn-blue" onclick="goAddPlayer()">+ Spieler hinzufügen</button>
      ${state.players.length?`<div class="spacer"></div><button class="btn-ghost" onclick="goEditWords()">Wörter ansehen &amp; bearbeiten (${allWords().length})</button>`:""}
    </div>

    <button class="btn-red" onclick="createTeams()" ${canTeams?"":"disabled"}>Teams erstellen</button>
    ${canTeams?"":`<p class="small-note">Mindestens ${minPlayers} Spieler nötig (2 pro Team).</p>`}
    <button class="testbtn" onclick="loadTestData()">🧪 Testdaten (4 Spieler, 3 Wörter, Timer 5s)</button>
  `;

  // keep settings in sync live
  app.querySelector("#setWords").addEventListener("change", e=>{
    let v = parseInt(e.target.value,10); if(isNaN(v)) v=5; v=Math.min(12,Math.max(1,v));
    state.settings.wordsPerPlayer = v; e.target.value=v; save();
  });
  wirePhaseEditors(app);
}

/* ----- phase editor (lobby) ----- */
function phaseEditor(p, i, n){
  return `
    <div class="phase-edit">
      <div class="phase-edit-head">
        <input type="text" class="pName" data-i="${i}" value="${esc(p.name)}" maxlength="22" placeholder="Phasenname" aria-label="Phasenname" />
        <div class="phase-timer">
          <input type="number" class="pTimer" data-i="${i}" value="${p.timer}" min="5" max="180" inputmode="numeric" aria-label="Timer in Sekunden" />
          <span>s</span>
        </div>
      </div>
      <textarea class="pDesc" data-i="${i}" rows="2" maxlength="160" placeholder="Hinweis für die Runde (optional)" aria-label="Hinweistext">${esc(p.desc)}</textarea>
      <div class="phase-actions">
        <button class="btn-ghost btn-sm" onclick="movePhase(${i},-1)" ${i===0?"disabled":""} title="Nach oben">↑</button>

function wirePhaseEditors(app){
  app.querySelectorAll(".pName").forEach(inp=>{
    inp.addEventListener("input", e=>{ phases()[+inp.dataset.i].name = e.target.value; });
    inp.addEventListener("blur", e=>{

function deletePhase(i){

function movePhase(i, dir){

function setFieldError(inp, errEl, msg){

}
function clearFieldError(inp){

// validates all word fields against each other and the existing pool (whitespace + casing ignored)
function liveValidateWords(){
  const app = document.getElementById("app");
  const inputs = [...app.querySelectorAll(".wordInput")];
  const existing = new Set(allWords().map(norm));   // words of already-added players
  const counts = {};
  inputs.forEach(inp=>{ if(inp.value.trim()){ const k=norm(inp.value); counts[k]=(counts[k]||0)+1; } });
  inputs.forEach(inp=>{
    const errEl = app.querySelector('.ferr[data-err="'+inp.dataset.i+'"]');
    const val = inp.value.trim();
    let msg = "";
    if(val){
      const k = norm(val);
      if(existing.has(k)) msg = "Schon von einem anderen Spieler genommen.";
      else if(counts[k] > 1) msg = "Dieses Wort hast du doppelt.";
    }
    setFieldError(inp, errEl, msg);
  });
}
function savePlayer(){
  const app = document.getElementById("app");
  const pn = app.querySelector("#pName");
  const inputs = [...app.querySelectorAll(".wordInput")];
  const addErr = app.querySelector("#addErr");
  addErr.textContent = "";

  let firstBad = null;

  // name: empty or duplicate
  if(!pn.value.trim()){ setFieldError(pn, app.querySelector("#nameErr"), "Bitte einen Namen eingeben."); firstBad = firstBad || pn; }
  else if(!validateName()){ firstBad = firstBad || pn; }

  // duplicate / pool checks for words
  liveValidateWords();

  // empty word fields
  inputs.forEach(inp=>{
    if(!inp.value.trim()){
      setFieldError(inp, app.querySelector('.ferr[data-err="'+inp.dataset.i+'"]'), "Bitte ausfüllen.");
      firstBad = firstBad || inp;
    }
  });

  const anyBad = pn.classList.contains("bad") || inputs.some(inp=>inp.classList.contains("bad"));
  if(firstBad || anyBad){
    addErr.textContent = "Bitte korrigiere die markierten Felder.";
    (firstBad || inputs.find(inp=>inp.classList.contains("bad")) || pn).focus();
    return;   // no re-render -> all already-entered values are kept
  }

  state.players.push({ name: pn.value.trim(), words: inputs.map(i=>i.value.trim()) });
  state.err = "";
  state.screen = "lobby";
  save(); render();
}

/* ----- team editing: rename + drag & drop (pointer-based, mobile-friendly) ----- */
function initTeamEditing(){
  const app = document.getElementById("app");
  app.querySelectorAll(".tname-input").forEach(inp=>{
    inp.addEventListener("input", e=>{ state.teams[+inp.dataset.team].name = e.target.value; });
    inp.addEventListener("change", commitTeamName);
    inp.addEventListener("blur", commitTeamName);
  });
  app.querySelectorAll(".member.draggable").forEach(chip=>{
    chip.addEventListener("pointerdown", onMemberPointerDown);
  });
}
function commitTeamName(e){
  const inp = e.target, ti = +inp.dataset.team;
  let v = inp.value.trim();
  if(!v){ v = ti===0 ? "Team Blau" : "Team Rot"; inp.value = v; }
  state.teams[ti].name = v; save();
}

let drag = null;
function onMemberPointerDown(e){
  if(e.pointerType==="mouse" && e.button!==0) return;
  const chip = e.currentTarget;
  drag = {
    chip, name:chip.dataset.name, fromTeam:+chip.dataset.team,
    startX:e.clientX, startY:e.clientY,
    started:false, ghost:null, placeholder:null, zone:null, toTeam:null, index:0
  };
  window.addEventListener("pointermove", onMemberPointerMove, {passive:false});
  window.addEventListener("pointerup", onMemberPointerUp);
  window.addEventListener("pointercancel", onMemberPointerUp);
}
function onMemberPointerMove(e){
  if(!drag) return;
  const dx = e.clientX-drag.startX, dy = e.clientY-drag.startY;
  if(!drag.started){
    if(dx*dx+dy*dy < 36) return;   // ~6px threshold before a drag begins
    startMemberDrag();
  }
  e.preventDefault();
  drag.ghost.style.left = e.clientX+"px";
  drag.ghost.style.top  = e.clientY+"px";
  drag.ghost.style.display = "none";
  const under = document.elementFromPoint(e.clientX, e.clientY);
  drag.ghost.style.display = "";
  const zone = under ? under.closest(".members.editable") : null;
  updateDropTarget(zone, e.clientX, e.clientY);
}
function startMemberDrag(){
  drag.started = true;
  drag.chip.classList.add("dragging");
  const ghost = document.createElement("div");
  ghost.className = "drag-ghost";
  ghost.textContent = drag.name;
  document.body.appendChild(ghost);
  drag.ghost = ghost;
  const ph = document.createElement("span");
  ph.className = "member placeholder";
  ph.textContent = drag.name;
  drag.placeholder = ph;
}
function updateDropTarget(zone, x, y){
  document.querySelectorAll(".members.dragover").forEach(z=>{ if(z!==zone) z.classList.remove("dragover"); });
  if(!zone){
    if(drag.placeholder.parentNode) drag.placeholder.remove();
    drag.zone = null; drag.toTeam = null; return;
  }
  zone.classList.add("dragover");
  const hint = zone.querySelector(".empty-hint"); if(hint) hint.remove();
  const idx = getDropIndex(zone, x, y);
  drag.zone = zone; drag.toTeam = +zone.dataset.team; drag.index = idx;
  const chips = [...zone.querySelectorAll(".member:not(.dragging):not(.placeholder)")];
  if(idx >= chips.length) zone.appendChild(drag.placeholder);
  else zone.insertBefore(drag.placeholder, chips[idx]);
}
function getDropIndex(zone, x, y){
  const chips = [...zone.querySelectorAll(".member:not(.dragging):not(.placeholder)")];
  if(chips.length===0) return 0;
  let best=0, bestD=Infinity, after=false;
  chips.forEach((c,i)=>{
    const r = c.getBoundingClientRect();
    const cx = r.left+r.width/2, cy = r.top+r.height/2;
    const d = (cx-x)**2 + (cy-y)**2;
    if(d < bestD){ bestD = d; best = i; after = (y > r.bottom) || (y >= r.top && x > cx); }
  });
  return after ? best+1 : best;
}
function onMemberPointerUp(){
  window.removeEventListener("pointermove", onMemberPointerMove);
  window.removeEventListener("pointerup", onMemberPointerUp);
  window.removeEventListener("pointercancel", onMemberPointerUp);
  if(!drag) return;
  const d = drag; drag = null;
  if(d.ghost) d.ghost.remove();
  if(d.placeholder && d.placeholder.parentNode) d.placeholder.remove();
  document.querySelectorAll(".members.dragover").forEach(z=>z.classList.remove("dragover"));
  if(d.chip) d.chip.classList.remove("dragging");
  if(!d.started) return;                 // it was just a tap
  if(d.toTeam!=null){ moveMember(d.name, d.fromTeam, d.toTeam, d.index); save(); }
  render();                              // rebuild a clean DOM either way
}
// index is relative to the target team WITHOUT the dragged member (placeholder excluded it already)
function moveMember(name, fromTeam, toTeam, toIndex){
  const from = state.teams[fromTeam].order;
  const fi = from.indexOf(name);
  if(fi < 0) return;
  from.splice(fi, 1);
  const to = state.teams[toTeam].order;
  toIndex = Math.max(0, Math.min(toIndex, to.length));
  to.splice(toIndex, 0, name);
  state.teams.forEach(t=>{
    t.pointer = t.order.length ? Math.min(Math.max(0, t.pointer||0), t.order.length-1) : 0;
  });
}

/* ----- playing ----- */
function startTurn(){
  unlockAudio();   // enable beeps while we have a user gesture
  const g = state.game;
  g.timeLeft = currentTimer();
  g.guessedThisTurn = [];
  g.turnStartPool = g.pool.slice();
  g.currentWord = null;
  g.phase = "playing";
  pickWord();
  save();
  render();
  if(timerId) clearInterval(timerId);
  timerId = setInterval(tick, 1000);
}
function tick(){
  const g = state.game;
  g.timeLeft--;
  if(g.timeLeft <= 0){ g.timeLeft = 0; beep(880, 0.6); endTurn(); return; }   // final long beep
  if(g.timeLeft <= 3) beep(660, 0.12);                                        // countdown ticks
  updateTimerUI();
  save();
}
function pickWord(){
  const g = state.game;
  if(g.pool.length===0){ g.currentWord=null; return; }
  let cands = g.pool.filter(w=>w!==g.currentWord);
  if(cands.length===0) cands = g.pool;           // only the skipped word remains
  g.currentWord = cands[Math.floor(Math.random()*cands.length)];
}
function guessed(){
  const g = state.game;
  if(!g.currentWord) return;
  g.guessedThisTurn.push(g.currentWord);
  g.pool = g.pool.filter(w=>w!==g.currentWord);
  g.currentWord = null;
  if(g.pool.length===0){ endTurn(); return; }    // subphase finished mid-turn
  pickWord();
  save();
  renderWordOnly();
}
function skipWord(){
  const g = state.game;
  pickWord();   // leaves current word in pool, shows another
  save();
  renderWordOnly();
}
function renderPlaying(){
  const g = state.game;
  const t = curTeam();
  const accent = t.color==="blue"?"blue":"red";
  const app = document.getElementById("app");
  app.innerHTML = `
    ${header()}
    ${gameStatusbar()}
    <div class="timer-wrap">
      <div class="timer-num ${g.timeLeft<=10?'low':''}" id="timerNum">${g.timeLeft}</div>
      <div class="bar"><i id="timerBar" style="width:${(g.timeLeft/currentTimer())*100}%"></i></div>
    </div>
    <div class="wordcard"><div class="w" id="curWord">${esc(g.currentWord||"–")}</div></div>
    <button class="btn-green" onclick="guessed()">Erraten ✓</button>
    <div class="spacer"></div>
    <button class="btn-amber" onclick="skipWord()">Skip ⤼</button>
  `;
}
function renderWordOnly(){
  const g = state.game;
  const w = document.getElementById("curWord");
  if(w) w.textContent = g.currentWord||"–";
  const c = document.getElementById("gCount");
  if(c) c.textContent = g.guessedThisTurn.length;
}
function updateTimerUI(){
  const g = state.game;
  const num = document.getElementById("timerNum");
  if(num){ num.textContent = g.timeLeft; num.classList.toggle("low", g.timeLeft<=10); }
  const bar = document.getElementById("timerBar");
  if(bar) bar.style.width = ((g.timeLeft/currentTimer())*100)+"%";
}

/* ----- end of a turn ----- */
function endTurn(){
  if(timerId){ clearInterval(timerId); timerId=null; }
  const g = state.game;
  const t = curTeam();
  t.score += g.guessedThisTurn.length;   // add guessed words to team total
  t.pointer = (t.pointer + 1) % t.order.length;   // fixed cycle for next time
  g.phase = "turnResult";
  save();
  render();
}
function renderTurnResult(){
  const g = state.game;
  const t = curTeam();   // team that just played (pointer already advanced, but team index unchanged)
  const poolEmpty = g.pool.length===0;
  const wordsHtml = g.guessedThisTurn.length
    ? `<div class="wlist">${g.guessedThisTurn.map((w,i)=>`<button class="wtag wtag-btn" onclick="undoGuess(${i})" title="Zurück in den Topf">${esc(w)} ✕</button>`).join("")}</div>
       <p class="hint" style="margin-top:10px;">Falsch gewertet? Tippe ein Wort an, um es zurück in den Topf zu legen – der Punkt wird abgezogen.</p>`
    : `<p class="hint">Diese Runde leider kein Wort erraten.</p>`;
  const cc = t.color==="blue"?"c-blue":"c-red";
  const app = document.getElementById("app");
  app.innerHTML = `
    ${header()}
    <h2 class="center">Zeit um! ⏱</h2>
    <div class="panel">
      <h3 class="${cc}">${esc(t.name)} – diese Runde</h3>
      <div class="center" style="font-size:40px;font-weight:800;margin:6px 0;">+${g.guessedThisTurn.length}</div>
      ${wordsHtml}
    </div>
    ${scoreBoard()}
    <button class="btn-blue" onclick="nextTurn()">
      ${poolEmpty ? "Runde ausgewertet – weiter" : "Weiter zum nächsten Team"}
    </button>
    ${poolEmpty?"":`<p class="small-note">Noch ${g.pool.length} Wörter in der Runde „${esc(phases()[g.subphaseIndex].name)}“.</p>`}
  `;
}
// put a wrongly-counted word back into the pool and revoke its point
function undoGuess(i){
  const g = state.game;
  if(i < 0 || i >= g.guessedThisTurn.length) return;
  const w = g.guessedThisTurn.splice(i,1)[0];
  curTeam().score = Math.max(0, curTeam().score - 1);
  g.pool.push(w);
  save(); render();
}
function nextTurn(){
  const g = state.game;
  if(g.pool.length===0){
    g.phase = "subphaseDone";
  }else{
    g.currentTeamIndex = 1 - g.currentTeamIndex;   // teams alternate
    g.phase = "ready";
  }
  save(); render();
}

/* ----- subphase finished ----- */
function renderSubphaseDone(){
  const g = state.game;
  const last = g.subphaseIndex >= phases().length-1;
  const app = document.getElementById("app");
  if(last){
    state.screen = "final";
    save(); return render();
  }
  const next = phases()[g.subphaseIndex+1];
  app.innerHTML = `
    ${header()}
    <div class="confetti">🎉</div>
    <h2 class="center">Runde „${esc(phases()[g.subphaseIndex].name)}“ geschafft!</h2>
    ${scoreBoard()}
    <div class="panel">
      <h3>Nächste Runde</h3>
      <div class="center" style="font-size:24px;font-weight:800;margin:4px 0;">${esc(next.name)}</div>
      <p class="hint center">${esc(next.desc)}</p>
      <p class="hint center" style="margin-top:8px;">Alle Wörter kommen wieder in den Topf.</p>
    </div>
    <button class="btn-green" onclick="nextSubphase()">Weiter zu „${esc(next.name)}“</button>
  `;
}
function nextSubphase(){
  const g = state.game;
  g.subphaseIndex++;
  g.pool = shuffle(allWords());
  g.currentTeamIndex = 1 - g.currentTeamIndex;
  g.currentWord = null;
  g.guessedThisTurn = [];
  g.phase = "ready";
  save(); render();
}

/* ----- scoreboards ----- */
function scoreBoard(){
  const [a,b] = state.teams;
  return `
    <div class="panel">
      <h3>Gesamtstand</h3>
      ${scoreRow(a)}
      ${scoreRow(b)}
    </div>`;
}
function scoreRow(t){
  const cls = t.color==="blue"?"team-blue":"team-red";
  const cc = t.color==="blue"?"c-blue":"c-red";
  const members = t.order.length
    ? `<div class="members" style="margin-top:8px;">${t.order.map(n=>`<span class="member">${esc(n)}</span>`).join("")}</div>`
    : "";
  return `<div class="scoreline ${cls}" style="flex-direction:column;align-items:stretch;gap:0;">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span class="${cc}" style="font-weight:800;">${esc(t.name)}</span>
      <span class="s">${t.score}</span>
    </div>
    ${members}
  </div>`;
}
function miniScore(){
  const [a,b] = state.teams;
  return `
    <div class="row" style="gap:10px;">
      <div class="scoreline team-blue grow"><span class="c-blue" style="font-weight:800;">${esc(a.name)}</span><span class="s">${a.score}</span></div>
      <div class="scoreline team-red grow"><span class="c-red" style="font-weight:800;">${esc(b.name)}</span><span class="s">${b.score}</span></div>
    </div>`;
}

/* ===================================================================
   FINAL
=================================================================== */
function renderFinal(){
  const [a,b] = state.teams;
  let title, sub;
  if(a.score===b.score){ title="Unentschieden!"; sub="Was für ein Krimi 🤝"; }
  else{
    const w = a.score>b.score?a:b;
    title = `${w.name} gewinnt! 🏆`;
    sub = w.color==="blue"?"Blau triumphiert 💙":"Rot triumphiert ❤️";
  }
  const app = document.getElementById("app");
  app.innerHTML = `
    ${header()}
    <div class="confetti">🎊🏆🎊</div>
    <div class="winner">${esc(title)}</div>
    <p class="center hint" style="margin-bottom:16px;">${sub}</p>
    ${scoreBoard()}
    <button class="btn-blue" onclick="confirmReset()">Neues Spiel</button>
  `;
}

/* ---------- router ---------- */
function render(){
  const s = state;
  if(s.screen==="lobby")      return renderLobby();
  if(s.screen==="addPlayer")  return renderAddPlayer();
  if(s.screen==="editWords")  return renderEditWords();
  if(s.screen==="teams")      return renderTeams();
  if(s.screen==="game")       return renderGame();
  if(s.screen==="final")      return renderFinal();
  renderLobby();
}

/* expose handlers used in inline onclick */
Object.assign(window,{
  confirmReset, removePlayer, goAddPlayer, cancelAdd, savePlayer, loadTestData,
  goEditWords, removeWord, addWord, finishEditWords,
  addPhase, deletePhase, movePhase,
  createTeams, startGame, startTurn, guessed, skipWord, nextTurn,
  nextSubphase, undoGuess
});

/* ---------- boot ---------- */
// best-effort portrait lock (works in installed/fullscreen PWA contexts; harmless otherwise)
try{
  if(screen.orientation && screen.orientation.lock){
    const p = screen.orientation.lock("portrait");
    if(p && p.catch) p.catch(()=>{});
  }
}catch(e){}

load();
render();
window.addEventListener("beforeunload", save);
</script>
</body>
</html>
